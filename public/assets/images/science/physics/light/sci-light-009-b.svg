<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Light bending toward the normal at a denser medium interface">
  <rect width="200" height="200" fill="#ffffff"/>
  <line x1="0" y1="100" x2="200" y2="100" stroke="#111827" stroke-width="2"/>
  <line x1="100" y1="20" x2="100" y2="180" stroke="#9ca3af" stroke-dasharray="3 3"/>
  <line x1="40" y1="30" x2="100" y2="100" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="130" y2="180" stroke="#ef4444" stroke-width="1.5"/>
  <text x="6" y="92" font-family="sans-serif" font-size="11" fill="#6b7280">rarer</text>
  <text x="6" y="116" font-family="sans-serif" font-size="11" fill="#6b7280">denser</text>
  <text x="105" y="32" font-family="sans-serif" font-size="11" fill="#6b7280">normal</text>
</svg>
